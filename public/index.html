<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <title>Rifa Solidária</title>

    <style>
      body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial;
      }

      .container {
        position: relative;
        width: 900px;
      }

      .rifa {
        width: 100%;
        display: block;
        border-radius: 20px;
      }

      .numero {
        position: absolute;
        border-radius: 50%;
        cursor: pointer;
        transition: 0.2s;
        transform: translate(-50%, -50%);
      }

      .numero:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .vendido {
        background: rgba(255, 0, 0, 0.6);
        border: 3px solid white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="rifa.png" class="rifa" />

      <div id="numeros"></div>
    </div>
    <script>
      const numerosDiv = document.getElementById("numeros");

      const POSICOES = {
        "00": [42, 885],
        "01": [90, 885],
        "02": [140, 885],
        "03": [180, 885],
        "04": [240, 885],
        "05": [280, 885],
        "06": [330, 885],
        "07": [380, 885],
        "08": [425, 885],
        "09": [470, 885],

        10: [42, 925],
        11: [90, 925],
        12: [140, 925],
        13: [180, 925],
        14: [240, 925],
        15: [280, 925],
        16: [330, 925],
        17: [380, 925],
        18: [425, 925],
        19: [470, 925],

        20: [42, 965],
        21: [90, 965],
        22: [140, 965],
        23: [180, 965],
        24: [240, 965],
        25: [280, 965],
        26: [330, 965],
        27: [380, 965],
        28: [425, 965],
        29: [470, 965],

        30: [42, 1000],
        31: [90, 1000],
        32: [140, 1000],
        33: [180, 1000],
        34: [240, 1000],
        35: [280, 1000],
        36: [330, 1000],
        37: [380, 1000],
        38: [425, 1000],
        39: [470, 1000],

        40: [42, 1040],
        41: [90, 1040],
        42: [140, 1040],
        43: [180, 1040],
        44: [240, 1040],
        45: [280, 1040],
        46: [330, 1040],
        47: [380, 1040],
        48: [425, 1040],
        49: [470, 1040],
      };

      async function loadVendidos() {
        const res = await fetch("/api/vendidos");
        return await res.json();
      }

      async function toggle(numero, el) {
        const vendido = el.classList.contains("vendido");

        if (vendido) {
          await fetch(`/api/desmarcar/${numero}`, {
            method: "POST",
          });

          el.classList.remove("vendido");
        } else {
          await fetch(`/api/marcar/${numero}`, {
            method: "POST",
          });

          el.classList.add("vendido");
        }
      }

      async function init() {
        const vendidos = await loadVendidos();

        Object.entries(POSICOES).forEach(([numero, pos]) => {
          const [x, y] = pos;

          const div = document.createElement("div");

          div.className = "numero";

          div.style.left = `${x}px`;
          div.style.top = `${y}px`;

          div.style.width = "25px";
          div.style.height = "25px";

          if (vendidos.includes(numero)) {
            div.classList.add("vendido");
          }

          div.onclick = () => toggle(numero, div);

          numerosDiv.appendChild(div);
        });
      }

      init();
    </script>
  </body>
</html>
